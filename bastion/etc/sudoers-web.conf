# Drop into /etc/sudoers.d/gpsaml-proxy-web (mode 0440, root:root).
# Validate with `visudo -cf /path` before installing.
#
# Lets the unprivileged web/API service (running as `gpw`) invoke the
# privileged provision helper. The helper itself does input validation
# and is the only way for `gpw` to reach root, so this rule is the
# entire trust boundary for the web tier.

gpw ALL=(root) NOPASSWD: /opt/gpsaml-proxy/bin/provision
