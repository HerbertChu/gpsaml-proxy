# Drop into /etc/ssh/sshd_config.d/99-gpsaml.conf (or pasted into
# /etc/ssh/sshd_config). Reload sshd after install:
#     systemctl reload sshd
#
# Constrains every member of the gpsaml-users group to public-key auth
# only, no PTY, no agent / X11 / TCP forwarding, no shell. The
# authorized_keys file written by `provision up` already carries a
# per-user `restrict,…,command="/opt/gpsaml-proxy/bin/enter-ns ns_<user>"`
# block; the directives below are belt-and-braces in case authorized_keys
# is replaced or sshd's defaults shift.
#
# IMPORTANT: this config does NOT alter sshd_config defaults for any
# user not in the gpsaml-users group, so the bastion's own root /
# admin SSH access is left alone.

Match Group gpsaml-users
    AuthenticationMethods publickey
    PasswordAuthentication no
    PermitTTY no
    AllowAgentForwarding no
    X11Forwarding no
    AllowTcpForwarding no
    PermitTunnel no
    # Default ForceCommand if authorized_keys somehow lost its command="":
    # extracts the namespace name from the user's home directory.
    # In normal operation this is overridden by the per-key command="".
    ForceCommand /opt/gpsaml-proxy/bin/enter-ns "ns_$(id -un)"
